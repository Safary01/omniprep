<!DOCTYPE html>
<html>
<head>
  <title>How To Play - HoverBird</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #87CEEB;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: white;
      max-width: 500px;
      margin: auto;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      text-align: left;
    }

    h1 {
      text-align: center;
    }

    ul {
      font-size: 18px;
      line-height: 1.6;
    }

    button {
      margin-top: 20px;
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>📖 How To Play</h1>

  <div class="card">
    <ul>
      <li>Tap the screen to make the bird flap.</li>
      <li>Pass through the gaps between pipes.</li>
      <li>Each pipe passed gives you 1 point.</li>
      <li>Avoid hitting pipes or the ground.</li>
      <li>The game gets harder as you progress.</li>
      <li>Try to beat your best score!</li>
    </ul>

    <button onclick="location.href='dashboard.html'">
      Back to Dashboard
    </button>
  </div>

</body>
</html>
