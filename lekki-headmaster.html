<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Lekki Headmaster | OmniPrep</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "DM Sans", sans-serif;
      background: #f8fafc;
      min-height: 100vh;
    }

    .top-bar {
      padding: 12px 16px;
      background: #0f172a;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .dashboard-btn {
      display: inline-block;
      text-decoration: none;
      color: white;
      background: green;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: 500;
    }

    .pdf-container {
      width: 100%;
      height: calc(100vh - 64px);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <a href="dashboard.html" class="dashboard-btn">
      🏠 Back to Dashboard
    </a>
  </div>

  <div class="pdf-container">
    <iframe src="summary-lekki-headmaster.pdf"></iframe>
  </div>

</body>
</html>
